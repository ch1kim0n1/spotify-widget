name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm audit --prod --audit-level high
      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check
      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: Test Rust
        working-directory: src-tauri
        run: cargo test
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: src-tauri/Cargo.toml
          command-arguments: licenses sources

  windows:
    name: Windows installers
    needs: preflight
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      HAS_SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID != '' }}
      HAS_WINDOWS_SIGNING: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile

      - name: Require production release credentials
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          if ($env:HAS_SPOTIFY_CLIENT_ID -ne "true") {
            throw "SPOTIFY_CLIENT_ID is required for a tagged release."
          }
          if ($env:HAS_WINDOWS_SIGNING -ne "true") {
            throw "Windows certificate and password are required for a tagged release."
          }

      - name: Import Windows signing certificate
        if: env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
          $path = Join-Path $env:RUNNER_TEMP "spotify-companion.pfx"
          [IO.File]::WriteAllBytes($path, $bytes)
          $secure = ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $secure
          $config = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $certificate.Thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
          } | ConvertTo-Json -Compress -Depth 5
          "TAURI_CONFIG=$config" | Out-File -FilePath $env:GITHUB_ENV -Append

      - run: pnpm tauri build --bundles nsis,msi

      - uses: actions/upload-artifact@v4
        with:
          name: spotify-companion-widget-windows
          path: |
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/msi/*
          if-no-files-found: error

  macos:
    name: Universal macOS app
    needs: preflight
    runs-on: macos-14
    permissions:
      contents: read
    env:
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      HAS_SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID != '' }}
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
      HAS_APPLE_NOTARIZATION: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile

      - name: Require production release credentials
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ "$HAS_SPOTIFY_CLIENT_ID" != "true" ]]; then
            echo "::error::SPOTIFY_CLIENT_ID is required for a tagged release."
            exit 1
          fi
          if [[ "$HAS_APPLE_SIGNING" != "true" ]]; then
            echo "::error::Apple certificate, password, and signing identity are required for a tagged release."
            exit 1
          fi
          if [[ "$HAS_APPLE_NOTARIZATION" != "true" ]]; then
            echo "::error::Apple notarization credentials are required for a tagged release."
            exit 1
          fi

      - uses: apple-actions/import-codesign-certs@v3
        if: env.HAS_APPLE_SIGNING == 'true'
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - run: pnpm tauri build --target universal-apple-darwin --bundles app,dmg

      - uses: actions/upload-artifact@v4
        with:
          name: spotify-companion-widget-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
